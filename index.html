<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earn Money</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f9f9f9;
        }
        hr {
            width: 50%;
            margin: 20px auto;
            border: 0;
            border-top: 1px solid #ccc;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background-color: #f4f4f7;
            padding: 15px;
            border-radius: 8px;
            width: fit-content;
            margin: 0 auto;
        }
        h3 {
            margin: 0;
            font-size: 1.1em;
            color: #333;
        }
        .ticker-container {
            margin-top: 30px;
            background-color: #e6e6e6;
            padding: 15px;
            border-radius: 5px;
            overflow: hidden;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
    
        }
    </style>
</head>
<body>

    <h1>Earn Money</h1>
    <hr>
    <div class="stats-container">
        <h3>Total Tasks: 50</h3>
        <h3>Completed Tasks: <span id="completed">0</span></h3>
        <h3>Referrals: <span id="referrals">0</span></h3>
        <h3>Total Money: $<span id="money">0</span></h3>
    </div>

    <div class="ticker-container">
        <div class="ticker-text" id="ticker-message"></div>
    </div>
<br>
    <style>
  .slot-container {
    margin-top: 50px;
    padding: 20px;
    background-color: #f9f9f9;
  }
  .task-ribbon {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #e0d0f7;
    border-radius: 30px;
    padding: 20px 25px;
    margin-bottom: 20px;
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
  }
  .task-text {
    font-size: 1.25rem; /* ~ h5 size */
    color: #333;
    margin: 0;
  }
  .watch-btn {
    position: relative;
    background-color: #ba8ef7; /* Light Violet */
    color: #fff;
    border: none;
    border-radius: 25px;
    padding: 10px 25px;
    font-size: 1.17rem; /* ~ h3 size */
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* Creates the lifted effect */
    transition: all 0.3s ease;
  }
  .watch-btn:hover {
    background-color: #9b65e6;
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    transform: translateY(-2px); /* Slight lift on hover */
  }
</style>

<div class="slot-container">
  <!-- Task 1 to 50 will go here -->
  <div class="task-ribbon">
    <h5 class="task-text">Task 1:</h5>
    <button class="watch-btn">Watch Ad</button>
  </div>
  <div class="task-ribbon">
    <h5 class="task-text">Task 2:</h5>
    <button class="watch-btn">Watch Ad</button>
  </div><div class="task-ribbon">
    <h5 class="task-text">Task 3:</h5>
    <button class="watch-btn">Watch Ad</button>
  </div>
  <div class="task-ribbon">
    <h5 class="task-text">Task 4:</h5>
    <button class="watch-btn">Watch Ad</button>
  </div>
</div>

    <script>
        const messages = [
            "Ali Arain has withdrawn Rs 50,000 via EasyPaisa (Phone: 0314-15*****)",
            "Sara Malik has withdrawn Rs 30,000 via JazzCash (Phone: 0300-12*****)",
            "Khan Pathan has withdrawn Rs 10,000 via EasyPaisa (Phone: 0321-78*****)",
            "Fatima Abbasi has withdrawn Rs 3,000 via JazzCash (Phone: 0333-45*****)"
        ];

        let index = 0;
        const messageElement = document.getElementById("ticker-message");

        function showNextMessage() {
            messageElement.classList.remove('show');
            
            setTimeout(() => {
                messageElement.textContent = messages[index];
                messageElement.classList.add('show');
                
                index = (index + 1) % messages.length;
            }, 1000); 
        }

        setInterval(showNextMessage, 5000);
        showNextMessage();
    </script>

</body>
</html>
