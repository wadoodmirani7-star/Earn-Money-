<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earn Money</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f9f9f9;
        }
        hr {
            width: 50%;
            margin: 20px auto;
            border: 0;
            border-top: 1px solid #ccc;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background-color: #f4f4f7;
            padding: 15px;
            border-radius: 8px;
            width: fit-content;
            margin: 0 auto;
        }
        h3 {
            margin: 0;
            font-size: 1.1em;
            color: #333;
        }
        .ticker-container {
            margin-top: 30px;
            background-color: #e6e6e6;
            padding: 10px;
            border-radius: 5px;
            overflow: hidden;
            white-space: nowrap;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .ticker-text {
            display: inline-block;
            animation: ticker 15s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate(100%, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body>

    <h1>Earn Money</h1>
    <hr>
    <div class="stats-container">
        <h3>Total Tasks: 50</h3>
        <h3>Completed Tasks: <span id="completed">0</span></h3>
        <h3>Referrals: <span id="referrals">0</span></h3>
        <h3>Total Money: $<span id="money">0</span></h3>
    </div>

    <div class="ticker-container">
        <div class="ticker-text" id="ticker-message">Loading...</div>
    </div>

    <script>
        const messages = [
            "Ali has withdrawn Rs 50,000 via EasyPaisa (Phone: 0314-15*****)",
            "Sara has withdrawn Rs 30,000 via JazzCash (Phone: 0300-12*****)",
            "Khan has withdrawn Rs 10,000 via EasyPaisa (Phone: 0321-78*****)",
            "Fatima has withdrawn Rs 3,000 via JazzCash (Phone: 0333-45*****)"
        ];

        let index = 0;
        const messageElement = document.getElementById("ticker-message");

        function updateMessage() {
            messageElement.textContent = messages[index];
            index = (index + 1) % messages.length;
        }

        setInterval(updateMessage, 2000);
        updateMessage();
    </script>

</body>
</html>
