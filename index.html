<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earn Money</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f9f9f9;
        }
        hr {
            width: 50%;
            margin: 20px auto;
            border: 0;
            border-top: 1px solid #ccc;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background-color: #f4f4f7;
            padding: 15px;
            border-radius: 8px;
            width: fit-content;
            margin: 0 auto;
        }
        h3 {
            margin: 0;
            font-size: 1.1em;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Earn Money</h1>
    <hr>
    <div class="stats-container">
        <h3>Total Tasks: 50</h3>
        <h3>Completed Tasks: <span id="completed">0</span></h3>
        <h3>Total Money: $<span id="money">0</span></h3>
    </div>

</body>
</html>
